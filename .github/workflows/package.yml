# Cairn packaging workflow — manual / tag-triggered installer builds.
#
# Business rules:
#   - Separate from `ci.yml` so installer builds don't run on every push.
#   - Each job produces a per-OS installer via electron-builder and uploads it
#     as an artifact for download/inspection.
#   - All `uses:` entries are pinned to full 40-character commit SHAs per
#     .claude/rules/general/security-practices.md.
#   - Dormant until the repo is on GitHub — validated via
#     `tests/ci/workflow-structure.test.ts`.

name: Package

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  package-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package (Windows / NSIS)
        run: pnpm package --win

      - name: Upload installers
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: cairn-windows-installer
          path: dist/installers/*.exe

  package-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package (macOS / DMG)
        run: pnpm package --mac
        # TODO (hardening task): populate APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD
        # for notarisation via scripts/notarize.js.

      - name: Upload installers
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: cairn-macos-installer
          path: dist/installers/*.dmg

  package-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package (Linux / AppImage)
        run: pnpm package --linux

      - name: Upload installers
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: cairn-linux-installer
          path: dist/installers/*.AppImage
