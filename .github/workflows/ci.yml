# Cairn CI — lint, typecheck, test, build gate.
#
# Business rules:
#   - Windows is the required runner; macOS/Linux runs are informational.
#   - Every `uses:` entry MUST be pinned to a full 40-character commit SHA
#     with a trailing `# <version>` comment per the root security-practices
#     rules (see .claude/rules/general/security-practices.md).
#   - Dormant: the repo is not yet hosted on GitHub. This workflow validates
#     via `tests/ci/workflow-structure.test.ts` — do not depend on live runs.
#   - When the repo is pushed to GitHub, verify each SHA against the pinned
#     semver tag; the tag comment is the drift indicator.

name: CI

on:
  push:
    branches: ['main']
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
